
services:

  app:

    build: .

    container_name: waste-bank-api

    restart: always

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mysql

    volumes:
      - .:/app
      - /app/node_modules
      - ./uploads:/app/uploads

  mysql:

    image: mysql:8.0

    container_name: waste-bank-db

    restart: always

    environment:

      DB_PORT: 3000
      
      DB_HOST: mysql

      DB_PORT: 3306

      DB_NAME: waste_bank

      DB_USER: wastebank

      DB_PASSWORD: wastebank
      
      JWT_SECRET: secret_key
      
      JWT_EXPIRES_IN: 7d
      
      PORT: 5000

    ports:

      - "3306:3306"

    volumes:

      - mysql_data:/var/lib/mysql

volumes:

  mysql_data:
